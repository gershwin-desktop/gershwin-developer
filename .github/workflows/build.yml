name: Build Gershwin System

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build-freebsd-14-amd64:
    name: FreeBSD x86_x64
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4

      - name: Build inside FreeBSD VM
        uses: vmactions/freebsd-vm@v1
        with:
          release: "14.3"
          usesh: true
          sync: rsync
          copyback: true
          cpu: 2
          mem: 4096
          prepare: |
            pkg update
            pkg install -y git tree squashfs-tools
          run: |
            set -e
            ./Library/Scripts/Bootstrap.sh
            ./Library/Scripts/Checkout.sh
            make install
            mkdir -p artifacts/FreeBSD/14/amd64
            tar -C / -cJf artifacts/FreeBSD/14/amd64/system.txz /System
            TIMESTAMP=$(date +%y%m%d%H%M%S)
            mksquashfs /System artifacts/FreeBSD/14/amd64/Gershwin-FreeBSD-${TIMESTAMP}.squashfs -comp xz -b 1M
            find /System -type f -perm -111 -exec sh -c 'ldd "$1" 2>/dev/null | awk "/=>/ {print \$3}" | xargs -n1 pkg which 2>/dev/null | grep package | awk "{print \$6}" | sed "s/-[^-]*\$//"' sh {} \; | sort -u > artifacts/FreeBSD/14/amd64/Gershwin-FreeBSD-${TIMESTAMP}.dependencies
            cd artifacts/FreeBSD/14/amd64
            tree -h -D -C -H -./ --houtro=/dev/null -T 'Gershwin System for FreeBSD 14 amd64' ./ > ./index.html

      - uses: actions/upload-artifact@v4
        with:
          name: gershwin-freebsd-14-amd64
          path: artifacts/FreeBSD/14/amd64
          if-no-files-found: error

  build-archlinux-x86_64:
    name: Arch x86_64
    runs-on: ubuntu-latest
    timeout-minutes: 240
    container:
      image: archlinux:latest
    steps:
      - name: Install build prerequisites
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm base-devel git tree squashfs-tools

      - uses: actions/checkout@v4

      - name: Bootstrap
        run: ./Library/Scripts/Bootstrap.sh

      - name: Checkout sources
        run: ./Library/Scripts/Checkout.sh

      - name: Build and install
        run: make install

      - name: Package
        run: |
          mkdir -p artifacts/ArchLinux/x86_64
          tar -C / -cJf artifacts/ArchLinux/x86_64/system.txz /System
          export TIMESTAMP=$(date +%y%m%d%H%M%S)
          mksquashfs /System artifacts/ArchLinux/x86_64/Gershwin-ArchLinux-${TIMESTAMP}.squashfs -comp xz -b 1M
          find /System -type f -perm -111 -exec sh -c 'ldd "$1" 2>/dev/null | awk "/=>/ {print \$3}" | xargs -n1 pacman -Qo 2>/dev/null | awk "{print \$5}"' sh {} \; | sort -u > artifacts/ArchLinux/x86_64/Gershwin-ArchLinux-${TIMESTAMP}.dependencies

      - name: Build index
        run: |
          cd artifacts/ArchLinux/x86_64
          tree -h -D -C -H -./ --houtro=/dev/null -T 'Gershwin System for Arch Linux x86_64' ./ > ./index.html

      - uses: actions/upload-artifact@v4
        with:
          name: gershwin-archlinux-x86_64
          path: artifacts/ArchLinux/x86_64
          if-no-files-found: error

  build-debian-x86_64:
    name: Debian x86_64
    runs-on: ubuntu-latest
    timeout-minutes: 240
    container:
      image: debian:bookworm
    steps:
      - name: Install build prerequisites
        run: |
          apt-get update
          apt-get -y install git tree squashfs-tools

      - uses: actions/checkout@v4

      - name: Bootstrap
        run: ./Library/Scripts/Bootstrap.sh

      - name: Checkout sources
        run: ./Library/Scripts/Checkout.sh

      - name: Build and install
        run: make install

      - name: Package
        run: |
          mkdir -p artifacts/Debian/x86_64
          tar -C / -cJf artifacts/Debian/x86_64/system.txz /System
          export TIMESTAMP=$(date +%y%m%d%H%M%S)
          mksquashfs /System artifacts/Debian/x86_64/Gershwin-Debian-${TIMESTAMP}.squashfs -comp xz -b 1M
          find /System -type f -perm -111 -exec sh -c 'ldd "$1" 2>/dev/null | awk "/=>/ {print \$3}" | xargs -n1 dpkg -S 2>/dev/null | cut -d: -f1' sh {} \; | sort -u > artifacts/Debian/x86_64/Gershwin-Debian-${TIMESTAMP}.dependencies

      - name: Build index
        run: |
          cd artifacts/Debian/x86_64
          tree -h -D -C -H -./ --houtro=/dev/null -T 'Gershwin System for Debian x86_64' ./ > ./index.html

      - uses: actions/upload-artifact@v4
        with:
          name: gershwin-debian-x86_64
          path: artifacts/Debian/x86_64
          if-no-files-found: error

  build-nextbsd-amd64:
    name: NextBSD x86_64
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4

      - name: Free up host disk
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true

      - name: Install tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends qemu-system-x86 ovmf socat expect jq unzip

      - name: Download NextBSD image
        run: |
          set -e
          mkdir -p nbsd-ci
          ssh-keygen -t ed25519 -N '' -f nbsd-ci/key -C gershwin-ci
          URL=$(curl -fsSL https://api.github.com/repos/nextbsd-redux/nextbsd/releases/tags/continuous | jq -r '.assets[]|select(.name|test("amd64.*\\.img\\.zip$")).browser_download_url' | head -1)
          [ -n "$URL" ] || { echo "no .img.zip"; exit 1; }
          curl -fsSL -o nbsd-ci/img.zip "$URL"
          curl -fsSL -o nbsd-ci/img.sha "$URL.sha256"
          [ "$(grep -Eo '[0-9a-f]{64}' nbsd-ci/img.sha | head -1)" = "$(sha256sum nbsd-ci/img.zip | cut -d' ' -f1)" ]
          unzip -p nbsd-ci/img.zip '*.img' > nbsd-ci/nextbsd.img
          rm -f nbsd-ci/img.zip nbsd-ci/img.sha
          truncate -s +10G nbsd-ci/nextbsd.img

      - name: Boot NextBSD, inject key over serial, build over SSH
        run: |
          set -u
          chmod 600 nbsd-ci/key
          OVMF=/usr/share/ovmf/OVMF.fd; [ -f "$OVMF" ] || OVMF=/usr/share/OVMF/OVMF_CODE.fd
          ACCEL="-accel tcg -cpu qemu64"
          [ -e /dev/kvm ] && sudo chmod 666 /dev/kvm 2>/dev/null || true
          { [ -r /dev/kvm ] && [ -w /dev/kvm ]; } && ACCEL="-accel kvm -cpu host" || true
          nohup qemu-system-x86_64 -machine q35 -m 6G -smp 4 $ACCEL -bios "$OVMF" \
            -drive file=nbsd-ci/nextbsd.img,format=raw,if=virtio \
            -nic user,model=virtio-net-pci,hostfwd=tcp::2222-:22 \
            -serial unix:nbsd-ci/serial.sock,server,nowait \
            -display none -no-reboot > nbsd-ci/qemu.out 2>&1 &
          QPID=$!
          for i in $(seq 1 60); do [ -S nbsd-ci/serial.sock ] && break; sleep 1; done
          PUB=$(cat nbsd-ci/key.pub)
          if expect -f /dev/stdin <<EXP
          set timeout 900
          log_file -a nbsd-ci/serial.log
          spawn socat - UNIX-CONNECT:nbsd-ci/serial.sock
          expect { "login:" { send "root\r" } timeout { exit 2 } }
          expect {
            "assword:" { send "\r"; exp_continue }
            -re {\# } { }
            timeout { exit 3 }
          }
          send "gpart recover vtbd0 >/dev/null 2>&1; gpart resize -i 3 vtbd0 >/dev/null 2>&1; growfs -y / >/dev/null 2>&1; mkdir -p /var/root/.ssh; echo '$PUB' > /var/root/.ssh/authorized_keys; chmod 700 /var/root/.ssh; chmod 600 /var/root/.ssh/authorized_keys; echo INJECT_OK\r"
          expect { "INJECT_OK" { } timeout { exit 4 } }
          EXP
          then :
          else echo "serial inject failed"; tail -n 80 nbsd-ci/serial.log 2>/dev/null; kill "$QPID" 2>/dev/null; exit 1
          fi
          SSH="ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=5 -i nbsd-ci/key -p 2222 root@127.0.0.1"
          up=0
          for i in $(seq 1 60); do
            if $SSH 'uname -srm' 2>/dev/null; then up=1; break; fi
            kill -0 "$QPID" 2>/dev/null || { echo "qemu died"; break; }
            sleep 5
          done
          [ "$up" = 1 ] || { echo "ssh never came up"; tail -n 80 nbsd-ci/serial.log 2>/dev/null; kill "$QPID" 2>/dev/null; exit 1; }
          tar -cf - --exclude ./.git --exclude ./nbsd-ci . | $SSH 'mkdir -p /build && tar -xf - -C /build'
          RC=0
          $SSH 'set -e; echo "uname -s = $(uname -s)"; cd /build; sh Library/Scripts/Bootstrap.sh; pkg install -y git; sh Library/Scripts/Checkout.sh; make install; test -d /System/Library' || RC=$?
          $SSH 'poweroff' 2>/dev/null || true
          sleep 5; kill "$QPID" 2>/dev/null || true
          exit $RC

      - name: Upload serial log
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: nextbsd-serial-log
          path: nbsd-ci/serial.log
          if-no-files-found: ignore
